            # - name: Update CSV File
            #   run: |
            #       FILE="data/submissions.csv"
            #       mkdir -p data

            #       if [ ! -f "$FILE" ]; then
            #         echo "Date,Email,Content" > "$FILE"
            #       fi

            #       echo "${{ steps.extract.outputs.date }},${{ steps.extract.outputs.email }},${{ steps.extract.outputs.content }}" >> "$FILE"

            - name: Extract Comment Data
              id: extract
              shell: bash
              run: |
                  # Capture raw body (maintaining newlines)
                  BODY="${{ github.event.comment.body }}"
                  CREATED_AT="${{ github.event.comment.created_at }}"

                  # 1. Extract Name: Look for text between Name: and Email:
                  NAME=$(echo "$BODY" \
                    | sed -n 's/.*\*\*Name:\*\*[[:space:]]*\([^*]*\).*/\1/p' \
                    | xargs)

                  # 2. Extract Email: Grabs content inside the parentheses
                  EMAIL=$(echo "$BODY" \
                    | sed -n 's/.*(\([^)]*\)).*/\1/p' \
                    | xargs)

                  # 3. # 3. Extract Message: Look for the line AFTER **Message:** (multi-line safe)
                  MSG=$(echo "$BODY" \
                    | sed -n '/\*\*Message:\*\*/,$p' \
                    | tail -n +2 \
                    | sed 's/\*\*//g')

                  # 4. Fallback: If Message is still empty, set a default
                  [ -z "$MSG" ] && MSG="No message content"

                  # 5. CSV sanitization: Replace commas with semicolons for CSV safety
                  SAFE_NAME=$(echo "$NAME" | tr ',' ';')
                  SAFE_MSG=$(echo "$MSG" | tr ',' ';')

                  # Output
                  echo "date=$CREATED_AT" >> $GITHUB_OUTPUT
                  echo "email=$EMAIL" >> $GITHUB_OUTPUT
                  echo "name=$SAFE_NAME" >> $GITHUB_OUTPUT
                  echo "msg=$SAFE_MSG" >> $GITHUB_OUTPUT

            - name: Update CSV File
              run: |
                  FILE="data/contact-form-submissions.csv"
                  mkdir -p data

                  # Create header if file is new
                  if [ ! -f "$FILE" ]; then
                    echo "Date,Email,Name,Message" > "$FILE"
                  fi

                  # Append formatted row
                  echo "${{ steps.extract.outputs.date }},${{ steps.extract.outputs.email }},${{ steps.extract.outputs.name }},${{ steps.extract.outputs.msg }}" >> "$FILE"

            - name: Commit and Push Changes
              run: |
                  FILE="data/contact-form-submissions.csv"
                  git config --global user.name "GitConnect Bot"
                  git config --global user.email "bot@automationexpert.us.kg"
                  git add $FILE
                  # Prevent error if nothing changed
                  git diff --quiet && git diff --staged --quiet || (git commit -m "auto: log entry from ${{ steps.extract.outputs.email }}" && git push)
