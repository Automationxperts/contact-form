name: "Sync Submissions to CSV"

on:
    workflow_dispatch:

    discussion_comment:
        types: [created]

jobs:
    append_to_csv:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Extract Comment Data
              id: extract
              shell: bash
              run: |
                  # Capture raw body (maintaining newlines)
                  BODY="${{ github.event.comment.body }}"
                  CREATED_AT="${{ github.event.comment.created_at }}"

                  # 1. Extract Name: Look for text between Name: and Email:
                  NAME=$(echo "$BODY" | sed -n 's/^\*\*Name:\*\*[[:space:]]*//p' | xargs)

                  # Extract Email
                  EMAIL=$(echo "$BODY" \
                    | sed -n 's/^\*\*Email:\*\*[[:space:]]*//p' \
                    | xargs)

                  # Extract Type
                  TYPE=$(echo "$BODY" \
                    | sed -n 's/^\*\*Type:\*\*[[:space:]]*//p' \
                    | xargs)

                  # Extract Message (multi-line safe)
                  MSG=$(echo "$BODY" \
                    | sed -n '/^\*\*Message:\*\*/,$p' \
                    | tail -n +2)

                  # 4. Fallback: If Message is still empty, set a default
                  [ -z "$MSG" ] && MSG="No message content"
                  [ -z "$TYPE" ] && TYPE="unknown"

                  # 5. CSV sanitization: Replace commas with semicolons for CSV safety
                  SAFE_NAME=$(echo "$NAME" | tr ',' ';')
                  SAFE_TYPE=$(echo "$TYPE" | tr ',' ';')
                  SAFE_MSG=$(echo "$MSG" | tr ',' ';')

                  # Output
                  echo "date=$CREATED_AT" >> $GITHUB_OUTPUT
                  echo "email=$EMAIL" >> $GITHUB_OUTPUT
                  echo "name=$SAFE_NAME" >> $GITHUB_OUTPUT
                  echo "type=$SAFE_TYPE" >> "$GITHUB_OUTPUT"
                  echo "msg=$SAFE_MSG" >> $GITHUB_OUTPUT

            - name: Update CSV File
              run: |
                  FILE="data/contact-form-submissions.csv"
                  mkdir -p data

                  # Create header if file is new
                  if [ ! -f "$FILE" ]; then
                    echo "Date,Email,Name,Type,Message" > "$FILE"
                  fi

                  # Append formatted row
                  echo "${{ steps.extract.outputs.date }},${{ steps.extract.outputs.email }},${{ steps.extract.outputs.name }},${{ steps.extract.outputs.type }},${{ steps.extract.outputs.msg }}" >> "$FILE"

            - name: Commit and Push Changes
              run: |
                  FILE="data/contact-form-submissions.csv"
                  git config --global user.name "GitConnect Bot"
                  git config --global user.email "bot@automationexpert.us.kg"
                  git add $FILE
                  # Prevent error if nothing changed
                  git diff --quiet && git diff --staged --quiet || (git commit -m "auto: log entry from ${{ steps.extract.outputs.email }}" && git push)
