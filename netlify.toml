[build]
  publish = "."
  # Explicitly point to the folder where github-submit.js lives
  functions = "api" 

[functions]
  node_bundler = "esbuild"

[[redirects]]
  # This maps the frontend call to the internal Netlify function path
  from = "/api/github-submit"
  to = "/.netlify/functions/github-submit"
  status = 200
  force = true